<!DOCTYPE html>
<html>
<head>
  <!-- ⭐ BING VERIFICATION META TAG -->
  <meta name="msvalidate.01" content="E4B2215A232B2D855D7B8ADE26C88488" />

  <title>HitBit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FIXED FAVICON WITH CACHE-BUSTER -->
  <link rel="icon" href="/HitBit/favicon.ico?v=3" type="image/x-icon">

  <style>
    :root {
      --bg: #000;
      --neon: #00ff88;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--neon);
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 24px;
    }

    #logo {
      font-size: 42px;
      font-weight: bold;
      text-shadow: 0 0 20px var(--neon);
      margin-top: 20px;
      margin-bottom: 10px;

      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      border-radius: 6px;
    }

    .subtitle {
      font-size: 20px;
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      padding-bottom: 40px;
    }

    .game {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .game-card {
      width: 100%;
      height: 180px;
      border-radius: 16px;
      overflow: hidden;
      border: 3px solid var(--neon);
      box-shadow: 0 0 20px var(--neon);
      transition: 0.2s ease;
    }

    .game-card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px var(--neon);
    }

    .game-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .game-title {
      font-size: 18px;
      margin-top: 8px;
      text-shadow: 0 0 10px var(--neon);
    }

    .info-btn {
      margin-top: 6px;
      font-size: 15px;
      cursor: pointer;
      color: var(--neon);
      text-decoration: underline;
      opacity: 0.9;
    }

    .info-btn:hover {
      opacity: 1;
    }

    #infoPanel {
      position: fixed;
      top: 0;
      right: -450px;
      width: 420px;
      height: 100%;
      background: #000;
      border-left: 3px solid var(--neon);
      box-shadow: -5px 0 20px var(--neon);
      padding: 20px;
      transition: right 0.35s ease;
      z-index: 999;
      overflow-y: auto;
      pointer-events: none;
    }

    #infoPanel.open {
      right: 0;
      pointer-events: auto;
    }

    #closePanel {
      text-align: right;
      font-size: 22px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    #panelTitle {
      font-size: 26px;
      font-weight: bold;
      text-shadow: 0 0 15px var(--neon);
      margin-bottom: 10px;
    }

    #panelContent {
      font-size: 16px;
      line-height: 1.5;
      text-align: left;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }

      #infoPanel {
        width: 100%;
        right: -100%;
      }
    }
  </style>
</head>

<body>

  <!-- FIXED REDIRECT PROTECTION -->
  <script>
    const path = window.location.pathname.replace(/\/+$/, "");
    if (path === "/HitBit/games") {
      window.location.href = "/HitBit/";
    }
  </script>

  <div id="logo">
    <img src="/HitBit/favicon.ico?v=3" class="logo-icon">
    HitBit
  </div>

  <div class="subtitle">Choose Your Challenge</div>

  <div class="grid">

    <!-- GAME 1 -->
    <div class="game">
      <a class="game-card" href="/HitBit/games/timingchallenge">
        <img src="/HitBit/images/timing.png">
      </a>
      <div class="game-title">Timing Challenge</div>
      <div class="info-btn" onclick="openInfo('timing')">Info</div>
    </div>

    <!-- GAME 2 -->
    <div class="game">
      <a class="game-card" href="/HitBit/games/visualreaction">
        <img src="/HitBit/images/visual.png">
      </a>
      <div class="game-title">Visual Reaction</div>
      <div class="info-btn" onclick="openInfo('reaction')">Info</div>
    </div>

    <!-- GAME 3 — ORB-FALL -->
    <div class="game">
      <a class="game-card" href="/HitBit/games/Orb-Fall/">
        <img src="/HitBit/images/Orb-Fall.png">
      </a>
      <div class="game-title">Orb‑Fall</div>
      <div class="info-btn" onclick="openInfo('orbfall')">Info</div>
    </div>

  </div>

  <!-- INFO PANEL -->
  <div id="infoPanel">
    <div id="closePanel" onclick="closeInfo()">✕</div>
    <div id="panelTitle"></div>
    <div id="panelContent"></div>
  </div>

  <script>
    function openInfo(game) {
      const title = document.getElementById("panelTitle");
      const content = document.getElementById("panelContent");

      if (game === "timing") {
        title.textContent = "Timing Challenge";
        content.innerHTML = `
          Tap exactly when the spinning line overlaps the target bar.<br><br>
          <strong>How it works:</strong><br>
          • A neon line rotates around the circle<br>
          • A target bar appears somewhere on the ring<br>
          • Tap when the line crosses the bar<br><br>
          <strong>Scoring:</strong><br>
          • Perfect hits give bonus points<br>
          • Spinner gets faster<br>
          • Target shrinks<br>
          • Build combos<br>
        `;
      }

      if (game === "reaction") {
        title.textContent = "Visual Reaction Challenge";
        content.innerHTML = `
          React as fast as possible when the screen turns green.<br><br>
          <strong>How it works:</strong><br>
          • Tap to begin<br>
          • Wait for green<br>
          • Tap instantly<br><br>
          <strong>Scoring:</strong><br>
          • Reaction time in ms<br>
          • Best saved locally<br>
        `;
      }

      if (game === "orbfall") {
        title.textContent = "Orb‑Fall";
        content.innerHTML = `
          Test your reflexes in <strong>Orb‑Fall</strong>, a fast‑paced arcade game where neon orbs fall from the top of the screen!<br><br>

          <strong>How it works:</strong><br>
          • Tap normal orbs to score points<br>
          • Avoid bombs — they cost a heart<br>
          • Catch hearts to stay alive<br>
          • Build combos for massive scores<br><br>

          <strong>Progression:</strong><br>
          • Waves get faster and harder<br>
          • Track your last 50 scores on a glowing line graph<br>
          • Beat your high score and climb your own leaderboard<br><br>

          <strong>Features:</strong><br>
          • Neon arcade visuals<br>
          • Smooth physics<br>
          • Mobile + desktop friendly<br>
          • Simple to play, hard to master<br>
        `;
      }

      document.getElementById("infoPanel").classList.add("open");
    }

    function closeInfo() {
      document.getElementById("infoPanel").classList.remove("open");
    }
  </script>

</body>
</html>
