<style>
:root {
  --bg: #050505;
  --accent: #00ff88; 
  --accent-glow: rgba(0, 255, 136, 0.25);
  --card-bg: rgba(255, 255, 255, 0.02);
  --border: rgba(255, 255, 255, 0.08);
  --text-dim: #94a3b8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: var(--bg);
  background-image: 
    radial-gradient(circle at 50% -10%, #0d2b1f 0%, transparent 50%),
    radial-gradient(circle at 0% 0%, #050505 0%, transparent 100%);
  color: white;
  font-family: 'Overpass', system-ui, sans-serif;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* NAVBAR */
.navbar {
  position: sticky;
  top: 0;
  backdrop-filter: blur(20px);
  background: rgba(5, 5, 5, 0.7);
  border-bottom: 1px solid var(--border);
  padding: 1rem 1.5rem;
  z-index: 1000;
}

.nav-inner {
  max-width: 1200px;
  margin: auto;
  display: flex;
  justify-content: center;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 800;
  font-size: 1.2rem;
  color: #fff;
}

.nav-logo img {
  width: 24px;
  height: 24px;
  border-radius: 4px;
}

/* HERO */
.hero {
  padding: 80px 24px 20px;
  text-align: center;
  max-width: 900px;
  margin: auto;
}

.hero-logo {
  width: 72px;
  height: 72px;
  margin-bottom: 24px;
  border-radius: 14px;
  box-shadow: 0 0 30px var(--accent-glow);
  border: 1px solid var(--border);
}

.hero h1 {
  font-size: clamp(2.5rem, 8vw, 4.5rem);
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1.1;
  margin-bottom: 1.5rem;
  color: #FFFFFF;
}

/* FEATURED */
#featured{
  max-width:1200px;
  margin: 10px auto 40px;
  padding:0 24px;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.featured-label{
  display:inline-block;
  margin-bottom:10px;
  font-size:11px;
  font-weight:800;
  letter-spacing:2px;
  color:#00ff88;
  opacity:0.9;
}

#featured .game-card{
  width:100%;
  max-width:520px;
}

/* GRID & CARDS */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 0 24px 100px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.game-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 24px;
  overflow: hidden;
  transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex;
  flex-direction: column;
  position: relative;
  opacity: 0;
  transform: translateY(20px);
}

.game-card.visible {
  opacity: 1;
  transform: translateY(0);
}

.game-card:hover {
  border-color: var(--accent);
  background: rgba(255, 255, 255, 0.04);
  transform: translateY(-10px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.game-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(400px circle at var(--x) var(--y), rgba(0,255,136,0.08), transparent 40%);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.game-card:hover::before { opacity: 1; }

.game-image {
  width: 100%;
  aspect-ratio: 16/10;
  object-fit: cover;
  transition: 0.6s ease;
  opacity: 0.9;
}
.game-card:hover .game-image {
  transform: scale(1.05);
  opacity: 1;
}

.card-body {
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.card-top{
  display:flex;
  justify-content:flex-start;
}

.difficulty-badge{
  font-size:11px;
  font-weight:700;
  padding:4px 10px;
  border-radius:999px;
  letter-spacing:0.5px;
  border:1px solid rgba(255,255,255,0.08);
}

.difficulty-badge.easy{
  color:#00ff88;
  background:rgba(0,255,136,0.08);
  box-shadow:0 0 12px rgba(0,255,136,0.15);
}

.difficulty-badge.medium{
  color:#ffcc00;
  background:rgba(255,204,0,0.08);
  box-shadow:0 0 12px rgba(255,204,0,0.12);
}

.difficulty-badge.hard{
  color:#ff4d6d;
  background:rgba(255,77,109,0.08);
  box-shadow:0 0 12px rgba(255,77,109,0.12);
}

.game-title {
  font-size: 1.2rem;
  font-weight: 700;
  color: #fff;
}

.card-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.play-btn {
  background: var(--accent);
  color: #000;
  padding: 10px 28px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 700;
  font-size: 0.9rem;
  transition: 0.3s;
}

.play-btn:hover {
  filter: brightness(1.1);
  box-shadow: 0 0 20px var(--accent-glow);
  transform: scale(1.05);
}

.info-btn {
  color: var(--text-dim);
  font-size: 0.85rem;
  cursor: pointer;
  padding: 8px;
  transition: 0.2s;
}

.info-btn:hover { color: #fff; }

/* PANEL */
#infoPanel {
  position: fixed;
  top: 10px;
  right: -500px;
  width: 420px;
  height: calc(100% - 20px);
  background: rgba(10, 10, 10, 0.95);
  backdrop-filter: blur(30px);
  border: 1px solid var(--border);
  border-radius: 20px 0 0 20px;
  z-index: 2000;
  padding: 40px;
  transition: right 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

#infoPanel.open { right: 0; }

#closePanel {
  position: absolute;
  top: 25px;
  right: 25px;
  font-size: 1.2rem;
  cursor: pointer;
  color: var(--text-dim);
}

#panelTitle {
  font-size: 2rem;
  font-weight: 800;
  margin-bottom: 1.5rem;
  color: var(--accent);
}

#panelContent {
  color: #cbd5e1;
  font-size: 0.95rem;
  line-height: 1.7;
}

#panelContent strong { color: #fff; }

footer {
  padding: 40px 20px;
  text-align: center;
  color: var(--text-dim);
  font-size: 0.8rem;
}

@media (max-width: 600px) {
  #infoPanel { width: 100%; border-radius: 0; top: 0; height: 100%; }
  .hero h1 { font-size: 3rem; }
}
</style>
</head>

<body>

<nav class="navbar">
  <div class="nav-inner">
    <div class="nav-logo">
      <img src="/HitBit/favicon.ico?v=3" alt="Logo">
      HitBit
    </div>
  </div>
</nav>

<header class="hero">
  <img src="/HitBit/favicon.ico?v=3" class="hero-logo" alt="HitBit Logo">
  <h1>Choose Your Challenge</h1>
</header>

<section id="featured"></section>

<main class="container">
  <div class="grid">

    <div class="game-card">
      <img src="/HitBit/images/stack.png" class="game-image">
      <div class="card-body">
        <div class="card-top"><span class="difficulty-badge medium">Medium</span></div>
        <h2 class="game-title">HitBit Stack</h2>
        <div class="card-actions">
          <a href="/HitBit/games/stack/" class="play-btn">Play</a>
          <span class="info-btn" onclick="openInfo('stack')">Info</span>
        </div>
      </div>
    </div>

    <div class="game-card">
      <img src="/HitBit/images/timing.png" class="game-image">
      <div class="card-body">
        <div class="card-top"><span class="difficulty-badge medium">Medium</span></div>
        <h2 class="game-title">Timing Challenge</h2>
        <div class="card-actions">
          <a href="/HitBit/games/timingchallenge" class="play-btn">Play</a>
          <span class="info-btn" onclick="openInfo('timing')">Info</span>
        </div>
      </div>
    </div>

    <div class="game-card">
      <img src="/HitBit/images/visual.png" class="game-image">
      <div class="card-body">
        <div class="card-top"><span class="difficulty-badge easy">Easy</span></div>
        <h2 class="game-title">Visual Reaction</h2>
        <div class="card-actions">
          <a href="/HitBit/games/visualreaction" class="play-btn">Play</a>
          <span class="info-btn" onclick="openInfo('reaction')">Info</span>
        </div>
      </div>
    </div>

    <div class="game-card">
      <img src="/HitBit/images/Orb-Fall.png" class="game-image">
      <div class="card-body">
        <div class="card-top"><span class="difficulty-badge hard">Hard</span></div>
        <h2 class="game-title">Orb-Fall</h2>
        <div class="card-actions">
          <a href="/HitBit/games/Orb-Fall/" class="play-btn">Play</a>
          <span class="info-btn" onclick="openInfo('orbfall')">Info</span>
        </div>
      </div>
    </div>

    <div class="game-card">
      <img src="/HitBit/images/strafe.png" class="game-image">
      <div class="card-body">
        <div class="card-top"><span class="difficulty-badge hard">Hard</span></div>
        <h2 class="game-title">HitBit Strafe</h2>
        <div class="card-actions">
          <a href="/HitBit/games/strafe/" class="play-btn">Play</a>
          <span class="info-btn" onclick="openInfo('strafe')">Info</span>
        </div>
      </div>
    </div>

    <div class="game-card">
      <img src="/HitBit/images/memory.png" class="game-image">
      <div class="card-body">
        <div class="card-top"><span class="difficulty-badge medium">Medium</span></div>
        <h2 class="game-title">HitBit Memory</h2>
        <div class="card-actions">
          <a href="/HitBit/games/memory/" class="play-btn">Play</a>
          <span class="info-btn" onclick="openInfo('memory')">Info</span>
        </div>
      </div>
    </div>

  </div>
</main>

<aside id="infoPanel">
  <div id="closePanel" onclick="closeInfo()">✕</div>
  <h2 id="panelTitle"></h2>
  <div id="panelContent"></div>
</aside>

<footer>
  © HitBit 2026
</footer>

<script>
document.querySelectorAll('.game-card').forEach(card => {
  card.onmousemove = e => {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    card.style.setProperty('--x', `${x}px`);
    card.style.setProperty('--y', `${y}px`);
  };
});

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) entry.target.classList.add('visible');
  });
}, { threshold: 0.1 });

document.querySelectorAll('.game-card').forEach(card => observer.observe(card));

function openInfo(game) {
  const title = document.getElementById("panelTitle");
  const content = document.getElementById("panelContent");

  const data = {
    stack: {
      t: "HitBit Stack",
      c: `Test your rhythm and precision by stacking blocks as high as you can.<br><br><strong>How it works:</strong><br>• Blocks slide back and forth across the screen<br>• Tap/Space to drop the block onto the stack<br>• Any part of the block hanging over the edge is sliced off<br>• The blocks get smaller as you miss<br><br><strong>Features:</strong><br>• 3D Isometric neon style<br>• Smooth camera scrolling<br>• Lives system to keep you in the game<br>• Performance stats (Height, Accuracy, Highscore)`
    },
    timing: {
      t: "Timing Challenge",
      c: `Tap exactly when the spinning line overlaps the target bar.<br><br><strong>How it works:</strong><br>• A neon line rotates around the circle<br>• A target bar appears somewhere on the ring<br>• Tap when the line crosses the bar<br><br><strong>Scoring:</strong><br>• Perfect hits give bonus points<br>• Spinner gets faster<br>• Build combos`
    },
    reaction: {
      t: "Visual Reaction",
      c: `React as fast as possible when the screen turns green.<br><br><strong>How it works:</strong><br>• Tap to begin<br>• Wait for green<br>• Tap instantly<br><br><strong>Scoring:</strong><br>• Reaction time in ms<br>• Best saved locally`
    },
    orbfall: {
      t: "Orb-Fall",
      c: `Test your reflexes in Orb-Fall, a fast-paced arcade game where neon orbs fall from the top of the screen!<br><br><strong>How it works:</strong><br>• Tap normal orbs to score points<br>• Avoid bombs (red balls) — they cost a heart<br>• Catch hearts (pink balls) to stay alive<br>• Build combos for massive scores`
    },
    strafe: {
      t: "HitBit Strafe",
      c: `Track the orb with your crosshair in this unpredictable neon aim-trainer.<br><br><strong>How it works:</strong><br>• The orb moves with chaotic bursts and jukes<br>• Stay on target to deal damage<br>• Kill the orb to score points<br>• 60-second rounds`
    },
    memory: {
      t: "HitBit Memory",
      c: `Repeat the glowing pattern on the 3×3 neon grid.<br><br><strong>How it works:</strong><br>• Watch the sequence of glowing tiles<br>• Repeat the pattern exactly<br>• Each round adds one more tile<br><br><strong>Rank System:</strong><br>• Bronze → Mythic<br>• Score graph tracking your last 20 runs`
    }
  };

  title.textContent = data[game].t;
  content.innerHTML = data[game].c;
  document.getElementById("infoPanel").classList.add("open");
}

function closeInfo() {
  document.getElementById("infoPanel").classList.remove("open");
}

/* FEATURED ROTATION */
const featuredGames = [
  {
    title: "Visual Reaction",
    image: "/HitBit/images/visual.png",
    link: "/HitBit/games/visualreaction",
    description: "Test raw reaction speed against a color change trigger.",
    difficulty: "easy"
  },
  {
    title: "HitBit Memory",
    image: "/HitBit/images/memory.png",
    link: "/HitBit/games/memory/",
    description: "Repeat growing neon patterns in sequence.",
    difficulty: "medium"
  },
  {
    title: "HitBit Stack",
    image: "/HitBit/images/stack.png",
    link: "/HitBit/games/stack/",
    description: "Stack blocks perfectly to build the tallest tower.",
    difficulty: "medium"
  },
  {
    title: "Orb-Fall",
    image: "/HitBit/images/Orb-Fall.png",
    link: "/HitBit/games/Orb-Fall/",
    description: "Dodge bombs and collect orbs.",
    difficulty: "hard"
  },
  {
    title: "HitBit Strafe",
    image: "/HitBit/images/strafe.png",
    link: "/HitBit/games/strafe/",
    description: "Track and eliminate the chaotic orb.",
    difficulty: "hard"
  }
];

function getDayIndex(){
  const now = new Date();
  const utc = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate());
  return Math.floor(utc / 86400000);
}

function renderFeatured(){
  const index = getDayIndex() % featuredGames.length;
  const game = featuredGames[index];

  document.getElementById("featured").innerHTML = `
    <div class="featured-label">FEATURED</div>
    <div class="game-card visible">
      <img src="${game.image}" class="game-image">
      <div class="card-body">
        <div class="card-top">
          <span class="difficulty-badge ${game.difficulty}">
            ${game.difficulty.toUpperCase()}
          </span>
        </div>
        <h2 class="game-title">${game.title}</h2>
        <p style="color:#94a3b8;font-size:0.9rem;">${game.description}</p>
        <div class="card-actions">
          <a href="${game.link}" class="play-btn">Play</a>
        </div>
      </div>
    </div>
  `;
}

renderFeatured();
</script>

</body>
</html>
