<!DOCTYPE html>
<html>
<head>
  <title>Visual Reaction Challenge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="/favicon.ico?v=3" type="image/x-icon">
  <link rel="shortcut icon" href="/favicon.ico?v=3" type="image/x-icon">
  <link rel="apple-touch-icon" href="/favicon.ico?v=3">
  <link rel="stylesheet" href="../../assets/hitbit-shared.css?v=1">

  <style>
    :root {
      --bg: #000;
      --red: #ff0033;
      --green: #00ff88;
      --darkgreen: #009955;
      --gray: #444;
      --neon: #00ff88;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: white;
      font-family: Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      height: 100vh;
      overflow: hidden;
      touch-action: manipulation;
    }

    #logo {
      position: fixed;
      top: 12px;
      left: 12px;
      font-size: 22px;
      font-weight: bold;
      color: var(--neon);
      text-shadow: 0 0 12px var(--neon);
      z-index: 10;
      cursor: pointer;
    }

    #modeLabel {
      position: fixed;
      bottom: 12px;
      left: 12px;
      font-size: 16px;
      opacity: 0.8;
      color: var(--neon);
      text-shadow: 0 0 10px var(--neon);
      z-index: 10;
    }

    #gameContainer {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(90vw, 90vh);
      height: min(90vw, 90vh);
      transform: translate(-50%, -50%);
      border: 3px solid var(--neon);
      border-radius: 16px;
      box-shadow: 0 0 20px var(--neon);
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #gameBox {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-size: 32px;
      font-weight: bold;
      color: white;
      transition: background 0.2s ease;
      text-align: center;
      cursor: pointer;
    }

    .sub-text {
      font-size: 20px;
      opacity: 0.9;
      margin-top: 10px;
    }

    .best-score, .avg-score {
      font-size: 16px;
      opacity: 0.7;
      margin-top: 5px;
      color: var(--neon);
    }

    canvas {
      margin-top: 12px;
      width: 80%;
      height: 120px;
    }
  </style>
</head>

<body data-hitbit-page="game" data-hitbit-remove="#logo">

  <div id="logo">HitBit</div>
  <div id="modeLabel">Visual Reaction Challenge</div>

  <div id="gameContainer">
    <div id="gameBox">Tap or Press Space to Start</div>
  </div>

  <script>
    let gameBox = document.getElementById("gameBox");
    const logo = document.getElementById("logo");

    logo.addEventListener("click", () => {
      window.location.href = "/";
    });

    let waiting = false;
    let canReact = false;
    let startTime = 0;
    let timeoutId = null;

    // Load stats
    let highScore = localStorage.getItem("hitbit_highscore") || null;
    let reactionHistory = JSON.parse(localStorage.getItem("hitbit_reaction_history") || "[]");

    function saveReaction(time) {
      reactionHistory.push(time);
      localStorage.setItem("hitbit_reaction_history", JSON.stringify(reactionHistory));
    }

    function getAverage() {
      if (reactionHistory.length === 0) return null;
      let sum = reactionHistory.reduce((a, b) => a + b, 0);
      return Math.round(sum / reactionHistory.length);
    }

    function drawGraph() {
      let canvas = document.getElementById("reactionGraph");
      let ctx = canvas.getContext("2d");

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (reactionHistory.length < 2) return;

      let max = Math.max(...reactionHistory);
      let min = Math.min(...reactionHistory);

      let padding = 10;
      let w = canvas.width - padding * 2;
      let h = canvas.height - padding * 2;

      ctx.strokeStyle = "#00ff88";
      ctx.lineWidth = 2;
      ctx.beginPath();

      reactionHistory.forEach((val, i) => {
        let x = padding + (i / (reactionHistory.length - 1)) * w;
        let y = padding + h - ((val - min) / (max - min)) * h;

        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });

      ctx.stroke();
    }

    function startGame() {
      gameBox.style.background = "var(--red)";
      gameBox.innerHTML = "WAIT...";
      waiting = true;
      canReact = false;

      let delay = 3000 + Math.random() * 5000;

      if (timeoutId) clearTimeout(timeoutId);

      timeoutId = setTimeout(() => {
        if (!waiting) return;
        gameBox.style.background = "var(--green)";
        gameBox.textContent = "GO!";
        canReact = true;
        waiting = false;
        startTime = performance.now();
      }, delay);
    }

    function showResult(text, isSuccess, time) {
      let color = isSuccess ? "var(--darkgreen)" : "var(--gray)";
      gameBox.style.background = color;

      let displayTime = isSuccess ? `${time} ms` : text;

      if (isSuccess) {
        saveReaction(time);

        if (highScore === null || time < highScore) {
          highScore = time;
          localStorage.setItem("hitbit_highscore", highScore);
        }
      }

      let avg = getAverage();
      let avgDisplay = avg ? `Average: ${avg} ms` : "Average: --";
      let bestDisplay = highScore ? `Best: ${highScore} ms` : "Best: --";

      gameBox.innerHTML = `
        ${displayTime}<br>
        <span class="sub-text">Tap or Press Space to Play Again</span><br>
        <span class="best-score">${bestDisplay}</span><br>
        <span class="avg-score">${avgDisplay}</span>
        <canvas id="reactionGraph" width="300" height="120"></canvas>
      `;

      drawGraph();
    }

    function handleInput() {
      if (waiting && !canReact) {
        waiting = false;
        clearTimeout(timeoutId);
        showResult("TOO SOON", false);
        return;
      }

      if (canReact) {
        let reaction = Math.floor(performance.now() - startTime);
        canReact = false;
        showResult(null, true, reaction);
        return;
      }

      if (!waiting && !canReact) {
        startGame();
      }
    }

    gameBox.addEventListener("click", handleInput);

    document.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        handleInput();
      }
    });
  </script>
<script src="../../assets/hitbit-shared.js?v=2"></script>

</body>
</html>
