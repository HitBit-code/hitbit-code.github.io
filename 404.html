<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - Page Not Found | HitBit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;700;900&display=swap" rel="stylesheet">
  
  <link rel="icon" href="/favicon.ico" type="image/x-icon">

  <style>
    :root {
      --brand: #00ff88;
      --bg: #010409;
      --text: #ffffff;
      --text-muted: #888888;
    }

    body {
      margin: 0; padding: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Overpass', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -2;
      background-image: 
        radial-gradient(at 10% 10%, rgba(0, 255, 136, 0.12) 0px, transparent 40%),
        radial-gradient(at 90% 10%, rgba(0, 255, 136, 0.08) 0px, transparent 35%),
        radial-gradient(at 50% 90%, rgba(0, 255, 136, 0.15) 0px, transparent 50%);
      filter: blur(60px);
      animation: nebula-drift 15s ease-in-out infinite alternate;
    }

    @keyframes nebula-drift {
      0% { background-position: 0% 0%; }
      100% { background-position: 100% 100%; }
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 500px;
      position: relative;
      z-index: 2;
    }

    .code {
      font-size: clamp(100px, 15vw, 160px);
      font-weight: 900;
      line-height: 0.9;
      margin: 0;
      background: linear-gradient(180deg, #fff 40%, var(--brand) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -6px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 15px 0 10px 0;
    }

    #status-msg {
      color: var(--text-muted);
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 40px;
      min-height: 1.6em;
    }

    .btn {
      display: inline-block;
      background-color: var(--brand);
      color: #000;
      text-decoration: none;
      padding: 16px 36px;
      font-weight: 700;
      font-size: 15px;
      border-radius: 4px;
      transition: all 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0, 255, 136, 0.4);
    }

    .redirecting {
        color: var(--brand) !important;
        font-weight: 700;
    }
  </style>
</head>
<body>

  <div class="container">
    <p class="code">404</p>
    <h1>Page not found</h1>
    <p id="status-msg">The requested resource could not be found.</p>
    <a href="/" class="btn">Back to homepage</a>
  </div>

  <script>
    // All paths updated to remove /HitBit/
    const pageMap = {
      "strafe": "/games/strafe/",
      "stack": "/games/stack/",
      "visualreaction": "/games/visualreaction/",
      "timingchallenge": "/games/timingchallenge/",
      "orb-fall": "/games/Orb-Fall/",
      "memory": "/games/memory/"
    };

    function getLevenshteinDistance(a, b) {
      const matrix = [];
      for (let i = 0; i <= b.length; i++) matrix[i] = [i];
      for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
      for (let i = 1; i <= b.length; i++) {
        for (let j = 1; j <= a.length; j++) {
          if (b.charAt(i - 1) === a.charAt(j - 1)) matrix[i][j] = matrix[i - 1][j - 1];
          else matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j] + 1);
        }
      }
      return matrix[b.length][a.length];
    }

    function tryAutoRedirect() {
      const pathSegments = window.location.pathname.split('/').filter(Boolean);
      const userTyped = pathSegments[pathSegments.length - 1] || "";
      const cleanInput = userTyped.toLowerCase().replace(".html", "");
      
      if (cleanInput.length < 2 || cleanInput === "hitbit") return;

      let bestMatchKey = null;
      
      for (let key in pageMap) {
        if (key.includes(cleanInput) || cleanInput.includes(key)) {
          bestMatchKey = key;
          break; 
        }
      }

      if (!bestMatchKey) {
        let minDistance = 4;
        Object.keys(pageMap).forEach(key => {
          const distance = getLevenshteinDistance(cleanInput, key);
          if (distance < minDistance) {
            minDistance = distance;
            bestMatchKey = key;
          }
        });
      }

      if (bestMatchKey) {
        const msg = document.getElementById('status-msg');
        msg.classList.add('redirecting');
        msg.innerHTML = `Path match found: <strong>${bestMatchKey}</strong>. Redirecting...`;
        
        setTimeout(() => {
          window.location.href = pageMap[bestMatchKey];
        }, 800);
      }
    }

    window.onload = tryAutoRedirect;
  </script>
</body>
</html>
